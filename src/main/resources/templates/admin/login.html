<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" class="h-100">
<head>
    <meta charset="UTF-8">
    <title>Novo Barbeiro - BarberShop Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        .navbar-brand { font-weight: bold; color: #f39c12 !important; }
        .card-custom { background-color: #1e1e1e; border: 1px solid #333; border-radius: 15px; }
        .btn-custom { background-color: #f39c12; color: #121212; font-weight: bold; }
        .btn-custom:hover { background-color: #e67e22; color: #fff; }
        .form-control { background-color: #2c2c2c; border: 1px solid #444; color: #fff; }
        .form-control:focus { background-color: #333; color: #fff; border-color: #f39c12; box-shadow: none;}
        .form-control::placeholder { color: #ffffff; opacity: 1;}
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">BARBERSHOP PRO</a>
        </div>
    </nav>

    <main class="container d-flex justify-content-center">
        <div class="card card-custom p-5 w-50 mt-4">
            <h3 class="text-center mb-4 text-warning">Acesso Administrativo</h3>

            <form th:action="@{/}" th:object="${login}" method="get">

                <div class="mb-3">
                    <label class="form-label text-secondary">Usuário</label>
                    <input type="text" class="form-control" th:field="*{usuario}" placeholder="Ex: Guilherme5502" required>
                </div>

                <div class="mb-4">
                    <label class="form-label text-secondary">Senha</label>
                    <input type="password" class="form-control" th:field="*{senha}" placeholder="**********" required>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-custom btn-lg">Entrar no Sistema</button>
                </div>

            </form>
        </div>
    </main>
</body>
</html>
