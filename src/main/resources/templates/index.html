<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberShop Pro - Gestão</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5">
    <div class="container">
        <a class="navbar-brand" href="/">BARBERSHOP PRO</a>
        <a class="navbar-brand btn btn-outline-light btn-sm" href="/admin/login">Login</a>
    </div>
</nav>

<div class="container">

    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold">Bem-vindo(a) ao Sistema</h1>
        <p class="text-secondary fs-5"> Verique o estoque e realize o laçancemento de serviços</p>
    </div>

    <div class="row g-4">

        <div class="col-md-6 mt-4">
            <div class="card card-custom p-5 text-center" style="border: 2px solid #f39c12;">
                <h2 class="text-color"> Produtos</h2>
                <h5 class="text-secondary mt-2 mb-4">Verificar valores e quantidade em estoque</h5>
                <a href="/produtos" class="btn btn-custom btn-lg w-50 mx-auto">Acessar</a>
            </div>
        </div>

        <div class="col-md-6 mt-4">
            <div class="card card-custom p-5 text-center" style="border: 2px solid #f39c12;">
                <h2 class="text-color">Registrar Novo Atendimento</h2>
                <h5 class="text-secondary mt-2 mb-4">Lance os serviço e os produtos vendidos.</h5>
                <a href="/atendimentos/novo" class="btn btn-custom btn-lg w-50 mx-auto">Iniciar Venda</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
