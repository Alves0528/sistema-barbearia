<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Barbeiros - BarberShop Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        .navbar-brand { font-weight: bold; color: #f39c12 !important; }
        .table-custom { color: #fff; background-color: #1e1e1e; border-radius: 10px; overflow: hidden; }
        .table-custom th { background-color: #2c2c2c; color: #f39c12; border-bottom: 1px solid #444; }
        .table-custom td { border-bottom: 1px solid #333; vertical-align: middle; }
        .btn-custom { background-color: #f39c12; color: #121212; font-weight: bold; border-radius: 20px; }
        .btn-custom:hover { background-color: #e67e22; color: #fff; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">BARBERSHOP PRO</a>
        <a href="/" class="btn btn-outline-light btn-sm">Voltar ao Início</a>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Equipe de Barbeiros</h2>
        <a href="/barbeiros/novo" class="btn btn-custom">+ Novo Barbeiro</a>
    </div>

    <div class="table-responsive">
        <table class="table table-custom text-center">
            <thead>
            <tr>
                <th>Código</th>
                <th>Nome</th>
                <th>Telefone</th>
                <th>Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="barbeiro : ${listaBarbeiros}">
                <td th:text="${barbeiro.id}">1</td>
                <td th:text="${barbeiro.nomeBarbeiro}">João</td>
                <td th:text="${barbeiro.telefoneBarbeiro}">9999-9999</td>
                <td>
                    <button class="btn btn-sm btn-outline-info">Editar</button>
                    <button class="btn btn-sm btn-outline-danger">Excluir</button>
                </td>
            </tr>
            </tbody>
        </table>

        <div th:if="${listaBarbeiros.empty}" class="text-center text-muted mt-4">
            <p class="text-secondary">Nenhum barbeiro cadastrado no sistema!</p>
        </div>
    </div>
</div>

</body>
</html>
