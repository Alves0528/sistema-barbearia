<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Atendimentos - BarberShop Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        .navbar-brand { font-weight: bold; color: #f39c12 !important; }
        .table-custom { color: #fff; background-color: #1e1e1e; border-radius: 10px; overflow: hidden; }
        .table-custom th { background-color: #2c2c2c; color: #f39c12; border-bottom: 1px solid #444; }
        .table-custom td { border-bottom: 1px solid #333; vertical-align: middle; }
        .btn-custom { background-color: #f39c12; color: #121212; font-weight: bold; border-radius: 20px; }
        .btn-custom:hover { background-color: #e67e22; color: #fff; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">BARBERSHOP PRO</a>
        <a href="/" class="btn btn-outline-light btn-sm">Voltar ao Início</a>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Lista de Atendimentos</h2>
        <a href="/atendimentos/novo" class="btn btn-custom">+ Novo Atendimento</a>
    </div>

    <div class="table-responsive">
        <table class="table table-custom text-center">
            <thead>
            <tr>
                <th>Código</th>
                <th>Barbeiro Responsável</th>
                <th>Comissão (R$)</th>
                <th>Total (R$)</th>
                <th>Data</th>
                <th>Início</th>
                <th>Término</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="atendimento : ${listaAtendimentos}">
                <td th:text="${atendimento.id}">1</td>
                <td th:text="${atendimento.barbeiro.nomeBarbeiro}">João</td>
                <td class="text-success fw-bold" th:text="|R$ ${atendimento.valorComissaoBarbeiro}|">45.99</td>
                <td th:text="${atendimento.valorTotal}">50.00</td>
                <td th:text="${#temporals.format(atendimento.data, 'dd/MM/yyyy')}">01/01/2026</td>
                <td th:text="${atendimento.horaInicio}">13:30</td>
                <td th:text="${atendimento.horaTermino}">14:30</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
