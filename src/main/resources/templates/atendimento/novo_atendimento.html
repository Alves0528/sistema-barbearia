<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nova Venda - BarberShop Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        .navbar-brand { font-weight: bold; color: #f39c12 !important; }
        .card-custom { background-color: #1e1e1e; border: 1px solid #333; border-radius: 15px; }
        .btn-custom { background-color: #f39c12; color: #121212; font-weight: bold; }
        .btn-custom:hover { background-color: #e67e22; color: #fff; }
        .form-control, .form-select { background-color: #2c2c2c; border: 1px solid #444; color: #fff; }
        .form-control:focus, .form-select:focus { background-color: #333; color: #fff; border-color: #f39c12; box-shadow: none; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">BARBERSHOP PRO</a>
        <a href="/atendimentos" class="btn btn-outline-light btn-sm">Voltar ao Histórico</a>
    </div>
</nav>

<div class="container d-flex justify-content-center">
    <div class="card card-custom p-5 w-75 mt-4">
        <h3 class="text-center mb-4 text-warning">Registrar Novo Atendimento</h3>

        <form th:action="@{/atendimentos/salvar}" th:object="${atendimento}" method="post">

            <div class="row ">
                <div class="col-md-6 mb-4">
                    <div class="row">
                        <div class="col-6 ">
                            <label class="form-label text-secondary">Horário de Inicio:</label>
                            <input
                                type="time"
                                class="form-control"
                                onclick="this.showPicker()"
                                th:field="*{horaInicio}"
                                min="08:00"
                                max="19:00"
                                step="1800"
                                required
                            >
                        </div>
                        <div class="col-6">
                            <label class="form-label text-secondary">Horário de Término:</label>
                            <input
                                type="time"
                                class="form-control"
                                onclick="this.showPicker()"
                                th:field="*{horaTermino}"
                                min="09:00"
                                max="20:00"
                                step="1800"
                                required
                            >
                        </div>
                    </div>
                </div>

                <div class="col-md-6 mb-4">
                    <label class="form-label text-secondary">Quem fez o atendimento?</label>
                    <select class="form-select" th:field="*{barbeiro}" required>
                        <option value="" disabled selected>-- Selecione um Barbeiro --</option>
                        <option th:each="b : ${listaBarbeiros}" th:value="${b.id}" th:text="${b.nomeBarbeiro}"></option>
                    </select>
                </div>

            </div>

            <div class="mb-4 p-3" style="border: 1px solid #444; border-radius: 10px;">
                <h5 class="text-warning"> Serviços Realizados</h5>
                <div th:each="serv : ${listaServicos}" class="form-check text-secondary">
                    <input class="form-check-input" type="checkbox" th:field="*{servicos}" th:value="${serv.id}">
                    <label class="form-check-label" th:text="${serv.nome} + ' (R$ ' + ${serv.precoServico} + ')'"></label>
                </div>
            </div>

            <div class="mb-4 p-3" style="border: 1px solid #444; border-radius: 10px;">
                <h5 class="text-warning"> Produtos Vendidos</h5>
                <div th:each="prod : ${listaProdutos}" class="form-check text-secondary">
                    <input class="form-check-input" type="checkbox" th:field="*{produtos}" th:value="${prod.id}">
                    <label class="form-check-label" th:text="${prod.nomeProduto} + ' (R$ ' + ${prod.precoProduto} + ')'"></label>
                </div>
            </div>

            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-custom btn-lg">Finalizar Atendimento</button>
            </div>
        </form>

    </div>
</div>

</body>
</html>
